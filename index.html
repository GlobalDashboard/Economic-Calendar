<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Economic Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0D2340;--navy2:#1a3557;--amber:#F5A623;--amber-bg:#2a1f00;
  --bg:#07111f;--card:#0f1e30;--border:#1a3050;--border2:#1e3a5f;
  --t1:#f0f4fa;--t2:#a8bdd4;--t3:#7a96b2;
  --red:#dc2626;--green:#059669;--blue:#2563eb;
  --r:10px;--r2:14px;
  --font:'Inter',system-ui,sans-serif;--mono:'SF Mono','JetBrains Mono',monospace;
}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;overscroll-behavior:none}

/* ── LAYOUT ─────────────────────────────── */
.shell{display:flex;flex-direction:column;min-height:100vh}

/* TOP BAR */
.topbar{background:var(--navy);height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:300;flex-shrink:0}
.tb-brand{display:flex;align-items:center;gap:8px}
.tb-pip{width:3px;height:20px;background:var(--amber);border-radius:2px;flex-shrink:0}
.tb-title{color:#fff;font-size:14px;font-weight:600}
.tb-period{font-size:11px;color:rgba(255,255,255,.45);margin-left:2px;display:none}
.tb-actions{display:flex;align-items:center;gap:6px}
.tb-search-btn{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.7);padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px}
.tb-filter-btn{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.7);padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;position:relative}
.filter-dot{position:absolute;top:4px;right:4px;width:6px;height:6px;background:var(--amber);border-radius:50%;display:none}

/* SEARCH BAR */
.search-bar{background:var(--navy2);padding:8px 16px;display:none}
.search-bar.open{display:block}
.search-input{width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:8px 12px;color:#fff;font-size:14px;outline:none}
.search-input::placeholder{color:rgba(255,255,255,.4)}

/* SUMMARY CARDS */
.summary{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 12px 0;flex-shrink:0}
.scard{background:var(--card);border-radius:var(--r);padding:12px 14px;border:1px solid var(--border);border-top:2.5px solid var(--amber)}
.sc-label{font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--t2);margin-bottom:4px}
.sc-val{font-size:20px;font-weight:700;color:var(--t1);line-height:1}
.sc-sub{font-size:11px;color:var(--t2);margin-top:3px}
.sc-high{color:var(--red) !important}

/* FILTER PILLS ROW */
.filter-row{padding:10px 12px 0;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
.filter-row::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;font-size:12px;font-weight:500;padding:6px 13px;border-radius:20px;border:1px solid var(--border2);background:var(--card);color:var(--t2);cursor:pointer;white-space:nowrap;transition:all .12s}
.pill.active{background:var(--navy);color:#fff;border-color:var(--navy)}

/* SECONDARY FILTER ROW */
.filter-row2{padding:8px 12px 0;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
.filter-row2::-webkit-scrollbar{display:none}
.sel-wrap{flex-shrink:0}
select{font-size:12px;padding:5px 10px;border:1px solid var(--border2);border-radius:8px;background:var(--card);color:var(--t1);color-scheme:dark;outline:none;height:32px;cursor:pointer;-webkit-appearance:none;appearance:none;padding-right:22px;background-image:url("data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2710%27 height=%2710%27 viewBox=%270 0 10 10%27%3E%3Cpath d=%27M2 3l3 4 3-4%27 fill=%27none%27 stroke=%27%238fa3be%27 stroke-width=%271.5%27/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 6px center}

/* GROUP TOGGLE */
.group-row{padding:8px 12px 0;display:flex;align-items:center;gap:8px;flex-shrink:0}
.grp-label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.grp-btns{display:flex;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0}
.grp-btn{font-size:12px;font-weight:500;padding:5px 12px;border:none;background:transparent;cursor:pointer;color:var(--t2);border-right:1px solid var(--border)}
.grp-btn:last-child{border-right:none}
.grp-btn.active{background:var(--navy);color:#fff}
.result-count{font-size:11px;color:var(--t2);margin-left:auto}

/* DATE NAV SCROLL */
.date-nav-wrap{padding:8px 12px 0;flex-shrink:0}
.date-nav{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.date-nav::-webkit-scrollbar{display:none}
.date-chip{flex-shrink:0;font-size:12px;font-weight:500;padding:5px 11px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--t2);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
.date-chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.date-cnt{font-size:10px;opacity:.7}

/* EVENTS LIST */
.events-wrap{padding:10px 12px 80px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* DATE GROUP HEADER */
.dg-header{background:var(--navy);color:#fff;padding:8px 12px;border-radius:8px 8px 0 0;margin-top:10px;display:flex;justify-content:space-between;align-items:center}
.dg-header:first-child{margin-top:0}
.dg-date{font-size:13px;font-weight:600}
.dg-count{font-size:11px;opacity:.55}

/* REGION/CATEGORY SUB-HEADER */
.sg-header{background:rgba(255,255,255,.04);padding:5px 12px;border-left:2px solid var(--border2);border-right:2px solid var(--border2);display:flex;justify-content:space-between}
.sg-name{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--t2)}
.sg-cnt{font-size:10px;color:var(--t2)}

/* EVENT CARD */
.event-card{background:var(--card);border-left:2px solid var(--border2);border-right:2px solid var(--border2);border-bottom:1px solid var(--border);padding:10px 12px;display:flex;flex-direction:column;gap:0}
.event-card:last-child{border-radius:0 0 8px 8px;border-bottom:2px solid var(--border2)}
.ec-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.ec-left{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.ec-name{font-size:13px;font-weight:500;color:var(--t1);line-height:1.3}
.ec-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cbadge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap}
.c-us{background:#1e3a6e;color:#93c5fd}
.c-ca{background:#0f3d2b;color:#6ee7b7}
.c-au{background:#3d2800;color:#fcd34d}
.c-jp{background:#3d0f2b;color:#f9a8d4}
.c-kr{background:#2d1e5c;color:#c4b5fd}
.c-cn{background:#3d1010;color:#fca5a5}
.c-tw{background:#3d1f0a;color:#fdba74}
.c-latam{background:#0f3d2b;color:#6ee7b7}
.cattag{display:inline-block;font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;white-space:nowrap}
.cat-Inflation{background:#3d1010;color:#fca5a5}
.cat-Employment{background:#0a2e1e;color:#6ee7b7}
.cat-GDP{background:#1a1e4a;color:#a5b4fc}
.cat-Trade{background:#0c2a40;color:#7dd3fc}
.cat-Manufacturing{background:#2e1f00;color:#fcd34d}
.cat-Consumer{background:#280d40;color:#d8b4fe}
.cat-Housing{background:#2e1500;color:#fdba74}
.cat-Money{background:#0a2e1a;color:#86efac}
.cat-Central{background:#2e2000;color:#fde68a}
.cat-Business{background:#1e1040;color:#c4b5fd}
.cat-CB{background:#2e1a00;color:#fcd34d}
.cat-Services{background:#052a33;color:#67e8f9}
.cat-Other{background:#1a2535;color:#6b7280}
.ec-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ec-time{font-size:11px;font-family:var(--mono);color:var(--t2);white-space:nowrap}
.impact-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap}
.imp-H{background:#3d1010;color:#fca5a5}
.imp-M{background:#2e1f00;color:#fcd34d}
.imp-L{background:#0a2e1a;color:#86efac}

/* DATA ROW */
.ec-data{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:rgba(255,255,255,.04);border-radius:6px;padding:7px 8px;margin-top:2px}
.dc{display:flex;flex-direction:column;align-items:center;gap:1px}
.dc-label{font-size:9px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--t3);opacity:.9}
.dc-val{font-size:12px;font-family:var(--mono);font-weight:500;color:var(--t1)}
.dc-val.beat{color:var(--green)}
.dc-val.miss{color:var(--red)}
.dc-val.muted{color:var(--t2)}

/* PERIOD INLINE */
.ec-period{font-size:10px;color:var(--t2);background:rgba(255,255,255,.07);padding:1px 5px;border-radius:3px;font-weight:500}

/* IMPACT MINI BAR */
.imp-bar-wrap{display:flex;align-items:center;gap:4px}
.imp-bar{width:40px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.imp-fill{height:100%;border-radius:2px}
.imp-H .imp-fill{background:var(--red)}
.imp-M .imp-fill, .imp-bar-wrap .imp-fill-M{background:var(--amber)}
.imp-L .imp-fill, .imp-bar-wrap .imp-fill-L{background:var(--green)}
.imp-fill-H{background:var(--red)}
.imp-fill-M{background:var(--amber)}
.imp-fill-L{background:var(--green)}
.imp-num{font-size:10px;color:var(--t2);font-variant-numeric:tabular-nums}

/* EMPTY */
.empty{padding:60px 20px;text-align:center;color:var(--t3)}
.empty p{font-size:14px;margin-top:8px}

/* ── DESKTOP OVERRIDES ─────────────────── */
@media(min-width:768px){
  .tb-period{display:inline}
  .summary{grid-template-columns:repeat(4,1fr);padding:16px 20px 0}
  .filter-row{padding:12px 20px 0;gap:8px}
  .filter-row2{padding:8px 20px 0;gap:8px}
  .group-row{padding:8px 20px 0}
  .date-nav-wrap{padding:10px 20px 0}
  .events-wrap{padding:12px 20px 80px}
  .ec-data{grid-template-columns:repeat(4,1fr)}
}

@media(min-width:1024px){
  .shell{display:grid;grid-template-columns:220px 1fr;grid-template-rows:50px 1fr;min-height:100vh}
  .topbar{grid-column:1/-1;grid-row:1}
  .left-panel{grid-column:1;grid-row:2;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;position:sticky;top:50px;height:calc(100vh - 50px)}
  .right-panel{grid-column:2;grid-row:2;display:flex;flex-direction:column;overflow:hidden;height:calc(100vh - 50px)}
  .events-wrap{flex:1;overflow-y:auto;padding:12px 20px 20px}
  .summary{grid-template-columns:repeat(5,1fr)}
  .tb-search-btn,.tb-filter-btn{display:none}
  .search-bar{display:none !important}
  .desktop-search{display:flex !important}
  .filter-row,.filter-row2,.group-row,.date-nav-wrap{flex-shrink:0}
}

/* Desktop left sidebar */
.left-panel{display:none}
@media(min-width:1024px){
  .left-panel{display:block}
  .mobile-date-nav{display:none}
}
.sb-section-head{padding:12px 16px 6px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);position:sticky;top:0;background:var(--card);border-bottom:1px solid var(--border)}
.sb-date{padding:8px 16px;font-size:12.5px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-left:3px solid transparent;color:var(--t2);transition:all .1s}
.sb-date:hover{background:rgba(255,255,255,.05);border-left-color:var(--border2)}
.sb-date.active{background:rgba(13,35,64,.6);color:var(--navy);font-weight:600;border-left-color:var(--navy)}
.sb-cnt{font-size:10px;background:#f0f3fa;padding:1px 7px;border-radius:10px;color:var(--t3)}
.sb-date.active .sb-cnt{background:var(--navy);color:#fff}
.sb-all-row{padding:10px 16px;font-size:13px;font-weight:600;color:var(--navy);cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:rgba(255,255,255,.04)}

/* Desktop top search */
.desktop-search{display:none;align-items:center;gap:8px}
.desktop-search input{font-size:12px;padding:5px 10px 5px 28px;border:1px solid rgba(255,255,255,.2);border-radius:8px;background:rgba(255,255,255,.1);color:#fff;outline:none;width:200px}
.desktop-search input::placeholder{color:rgba(255,255,255,.4)}
.ds-icon{position:relative}
.ds-icon input{padding-left:28px}
</style>
</head>
<body>
<div class="shell">

<!-- TOP BAR -->
<div class="topbar">
  <div class="tb-brand">
    <div class="tb-pip"></div>
    <span class="tb-title">Economic Calendar</span>
    <span class="tb-period">&nbsp;·&nbsp; Jun – Jul 2026</span>
  </div>
  <div class="desktop-search ds-icon" style="position:relative">
    <svg style="position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:.5" width="13" height="13" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="desktop-search" placeholder="Search events…" oninput="render()">
  </div>
  <div class="tb-actions">
    <button class="tb-search-btn" onclick="toggleSearch()" id="mob-search-btn">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <button class="tb-filter-btn" onclick="toggleFilterPanel()" id="mob-filter-btn">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
      <span class="filter-dot" id="filter-dot"></span>
    </button>
  </div>
</div>

<!-- MOBILE SEARCH -->
<div class="search-bar" id="mob-search-bar">
  <input type="text" class="search-input" id="mob-search" placeholder="Search events, countries…" oninput="render()">
</div>

<!-- LEFT PANEL (desktop) -->
<div class="left-panel" id="left-panel">
  <div class="sb-section-head">Dates</div>
  <div id="desktop-date-nav"></div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel" id="right-panel">

  <!-- SUMMARY -->
  <div class="summary">
    <div class="scard">
      <div class="sc-label">Total</div>
      <div class="sc-val" id="s-total">991</div>
      <div class="sc-sub">events</div>
    </div>
    <div class="scard">
      <div class="sc-label">High Impact</div>
      <div class="sc-val sc-high" id="s-high">—</div>
      <div class="sc-sub">score &gt; 85</div>
    </div>
    <div class="scard" id="sc-dates-card">
      <div class="sc-label">Date Range</div>
      <div class="sc-val" style="font-size:14px;padding-top:3px" id="s-range">—</div>
      <div class="sc-sub" id="s-days">—</div>
    </div>
    <div class="scard">
      <div class="sc-label">Showing</div>
      <div class="sc-val" id="s-showing">—</div>
      <div class="sc-sub" id="s-showing-sub">—</div>
    </div>

  </div>

  <!-- FILTER ROWS (always visible on mobile) -->
  <div id="filter-panel">
    <div class="filter-row" id="region-pills">
      <button class="pill active" onclick="setRegion('all',this)">All regions</button>
      <button class="pill" onclick="setRegion('North America',this)">N. America</button>
      <button class="pill" onclick="setRegion('Asia-Pacific',this)">Asia-Pacific</button>
      <button class="pill" onclick="setRegion('Latin America',this)">LATAM</button>
    </div>
    <div class="filter-row2">
      <select id="sel-country" onchange="render()"><option value="">All countries</option></select>
      <select id="sel-cat" onchange="render()"><option value="">All categories</option></select>
      <select id="sel-impact" onchange="render()">
        <option value="">All impact</option>
        <option value="high">High (&gt;85)</option>
        <option value="med">Medium (50–85)</option>
        <option value="low">Low (&lt;50)</option>
      </select>
    </div>
    <div class="group-row">
      <span class="grp-label">Group by</span>
      <div class="grp-btns">
        <button class="grp-btn active" onclick="setGroup('date',this)">Date</button>
        <button class="grp-btn" onclick="setGroup('cat',this)">Category</button>
        <button class="grp-btn" onclick="setGroup('country',this)">Country</button>
      </div>
      <span class="result-count" id="result-count"></span>
    </div>
    <!-- Mobile date chips -->
    <div class="date-nav-wrap mobile-date-nav">
      <div class="date-nav" id="mob-date-nav"></div>
    </div>
  </div>

  <!-- EVENTS -->
  <div class="events-wrap" id="events-wrap">
    <div id="events-list"></div>
    <div class="empty" id="empty-state" style="display:none">
      <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" opacity=".4"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>No events match your filters.</p>
    </div>
  </div>

</div><!-- end right-panel -->
</div><!-- end shell -->

const REGION_MAP={
  'United States':'North America','Canada':'North America',
  'Australia':'Asia-Pacific','Japan':'Asia-Pacific','South Korea':'Asia-Pacific',
  'China':'Asia-Pacific','Taiwan':'Asia-Pacific',
  'Brazil':'Latin America','Mexico':'Latin America','Argentina':'Latin America',
  'Colombia':'Latin America','Chile':'Latin America','Peru':'Latin America',
  'Venezuela':'Latin America','Paraguay':'Latin America','Uruguay':'Latin America'
};
const FLAGS={'United States':'🇺🇸','Canada':'🇨🇦','Australia':'🇦🇺','Japan':'🇯🇵','South Korea':'🇰🇷','China':'🇨🇳','Taiwan':'🇹🇼','Brazil':'🇧🇷','Mexico':'🇲🇽','Argentina':'🇦🇷','Colombia':'🇨🇴','Chile':'🇨🇱','Peru':'🇵🇪','Venezuela':'🇻🇪','Paraguay':'🇵🇾','Uruguay':'🇺🇾'};
const CBADGE={'United States':'c-us','Canada':'c-ca','Australia':'c-au','Japan':'c-jp','South Korea':'c-kr','China':'c-cn','Taiwan':'c-tw','Brazil':'c-latam','Mexico':'c-latam','Argentina':'c-latam','Colombia':'c-latam','Chile':'c-latam','Peru':'c-latam','Venezuela':'c-latam','Paraguay':'c-latam','Uruguay':'c-latam'};
const CAT_CSS={'Inflation':'cat-Inflation','Employment':'cat-Employment','GDP / Growth':'cat-GDP','Trade & Capital Flows':'cat-Trade','Manufacturing / PMI':'cat-Manufacturing','Consumer':'cat-Consumer','Housing & Construction':'cat-Housing','Money & Credit':'cat-Money','Central Bank / Rates':'cat-Central','Business Sentiment':'cat-Business','CB Survey / Comms':'cat-CB','Services & Output':'cat-Services','Other':'cat-Other','Fiscal':'cat-Central','Reserves':'cat-Other'};
const CAT_SHORT={'Inflation':'Inflation','Employment':'Employment','GDP / Growth':'GDP','Trade & Capital Flows':'Trade','Manufacturing / PMI':'Mfg/PMI','Consumer':'Consumer','Housing & Construction':'Housing','Money & Credit':'Money','Central Bank / Rates':'CB Rates','Business Sentiment':'Biz Sentiment','CB Survey / Comms':'CB Comms','Services & Output':'Services','Other':'Other','Fiscal':'Fiscal','Reserves':'Reserves'};
const CAT_ORDER=['Central Bank / Rates','Inflation','Employment','GDP / Growth','Trade & Capital Flows','Manufacturing / PMI','Consumer','Housing & Construction','Money & Credit','Business Sentiment','Services & Output','CB Survey / Comms','Fiscal','Reserves','Other'];
const REG_ORDER=['North America','Asia-Pacific','Latin America'];

let activeRegion='all',activeDate=null,groupBy='date';

function parseDt(d){
  if(!d) return 0;
  const s=d.split('\u2013')[0].trim(),p=s.split('-');
  const M={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  return p.length===3?new Date(+p[2],M[p[1]],+p[0]).getTime():0;
}

// Populate dropdowns
const countries=[...new Set(DATA.map(r=>r.Country))].sort();
const selC=document.getElementById('sel-country');
countries.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=(FLAGS[c]||'')+' '+c;selC.appendChild(o);});
const cats=[...new Set(DATA.map(r=>r.Category))];
const selCat=document.getElementById('sel-cat');
CAT_ORDER.filter(c=>cats.includes(c)).forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=CAT_SHORT[c]||c;selCat.appendChild(o);});

function getSearch(){
  const d=document.getElementById('desktop-search');
  const m=document.getElementById('mob-search');
  return (d&&d.value||m&&m.value||'').toLowerCase().trim();
}

function getFiltered(){
  const country=selC.value,cat=selCat.value;
  const impact=document.getElementById('sel-impact').value;
  const q=getSearch();
  return DATA.filter(r=>{
    if(activeRegion!=='all'&&REGION_MAP[r.Country]!==activeRegion) return false;
    if(country&&r.Country!==country) return false;
    if(cat&&r.Category!==cat) return false;
    if(impact==='high'&&r.Relevance<=85) return false;
    if(impact==='med'&&(r.Relevance<50||r.Relevance>85)) return false;
    if(impact==='low'&&r.Relevance>=50) return false;
    if(activeDate&&r.Date!==activeDate) return false;
    if(q&&!r.Event.toLowerCase().includes(q)&&!r.Country.toLowerCase().includes(q)&&!r.Category.toLowerCase().includes(q)) return false;
    return true;
  });
}

function impCls(v){return v>85?'H':v>=50?'M':'L';}
function numCmp(a,s){
  if(!a||a==='--'||!s||s==='--') return '';
  const p=x=>parseFloat(x.replace(/[%$,bmkBMK]/g,''));
  const av=p(a),sv=p(s);
  if(isNaN(av)||isNaN(sv)) return '';
  return av>sv?'beat':av<sv?'miss':'';
}

function makeEventCard(r){
  const bc=CBADGE[r.Country]||'c-latam';
  const cc=CAT_CSS[r.Category]||'cat-Other';
  const cs=CAT_SHORT[r.Category]||r.Category;
  const ic=impCls(r.Relevance);
  const bw=Math.min(100,Math.round(r.Relevance));
  const cmp=numCmp(r.Actual,r.Survey);
  const ac=cmp==='beat'?'beat':cmp==='miss'?'miss':'muted';
  const hasData=r.Survey!='--'||r.Actual!='--'||r.Prior!='--';
  const dataRow=hasData?`
    <div class="ec-data">
      <div class="dc"><span class="dc-label">Survey</span><span class="dc-val muted">${r.Survey}</span></div>
      <div class="dc"><span class="dc-label">Actual</span><span class="dc-val ${ac}">${r.Actual}</span></div>
      <div class="dc"><span class="dc-label">Prior</span><span class="dc-val muted">${r.Prior}</span></div>
      <div class="dc"><span class="dc-label">Revised</span><span class="dc-val muted">${r.Revised}</span></div>
    </div>`:'';
  return `<div class="event-card">
    <div class="ec-top">
      <div class="ec-left">
        <div class="ec-name">${r.Event}</div>
        <div class="ec-meta">
          <span class="cbadge ${bc}">${FLAGS[r.Country]||''} ${r.Country}</span>
          <span class="cattag ${cc}">${cs}</span>
          ${r.Period&&r.Period!='—'?`<span class="ec-period">${r.Period}</span>`:''}
        </div>
      </div>
      <div class="ec-right">
        <span class="ec-time">${r.Time||'TBD'}</span>
        <div class="imp-bar-wrap">
          <div class="imp-bar"><div class="imp-fill imp-fill-${ic}" style="width:${bw}%"></div></div>
          <span class="imp-num">${r.Relevance.toFixed(1)}</span>
        </div>
        <span class="impact-badge imp-${ic}">${ic==='H'?'High':ic==='M'?'Med':'Low'}</span>
      </div>
    </div>
    ${dataRow}
  </div>`;
}

function makeGroupHeader(label,count,isMain){
  if(isMain) return `<div class="dg-header"><span class="dg-date">${label}</span><span class="dg-count">${count} event${count!==1?'s':''}</span></div>`;
  return `<div class="sg-header"><span class="sg-name">${label}</span><span class="sg-cnt">${count}</span></div>`;
}

function renderGroupDate(filtered){
  const byDate={};
  filtered.forEach(r=>{
    if(!byDate[r.Date]) byDate[r.Date]={};
    const reg=REGION_MAP[r.Country]||'Other';
    if(!byDate[r.Date][reg]) byDate[r.Date][reg]=[];
    byDate[r.Date][reg].push(r);
  });
  const sortedDates=Object.keys(byDate).sort((a,b)=>parseDt(a)-parseDt(b));
  let html='';
  sortedDates.forEach(d=>{
    const dayTotal=Object.values(byDate[d]).reduce((s,a)=>s+a.length,0);
    html+=makeGroupHeader(d.replace('-2026',''),dayTotal,true);
    REG_ORDER.forEach(reg=>{
      if(!byDate[d][reg]) return;
      html+=makeGroupHeader(reg,byDate[d][reg].length,false);
      byDate[d][reg].forEach(r=>{html+=makeEventCard(r);});
    });
  });
  return html;
}

function renderGroupCat(filtered){
  const byCat={};
  filtered.forEach(r=>{if(!byCat[r.Category])byCat[r.Category]=[];byCat[r.Category].push(r);});
  let html='';
  CAT_ORDER.filter(c=>byCat[c]).forEach(cat=>{
    const items=byCat[cat].sort((a,b)=>parseDt(a.Date)-parseDt(b.Date));
    html+=makeGroupHeader(cat,items.length,true);
    items.forEach(r=>{html+=makeEventCard(r);});
  });
  return html;
}

function renderGroupCountry(filtered){
  const byC={};
  filtered.forEach(r=>{if(!byC[r.Country])byC[r.Country]=[];byC[r.Country].push(r);});
  let html='';
  REG_ORDER.forEach(reg=>{
    const regCs=Object.keys(byC).filter(c=>REGION_MAP[c]===reg).sort();
    if(!regCs.length) return;
    html+=`<div class="dg-header" style="background:var(--navy2)"><span class="dg-date">${reg}</span><span class="dg-count">${regCs.length} countries</span></div>`;
    regCs.forEach(country=>{
      html+=makeGroupHeader((FLAGS[country]||'')+' '+country,byC[country].length,false);
      byC[country].sort((a,b)=>parseDt(a.Date)-parseDt(b.Date)).forEach(r=>{html+=makeEventCard(r);});
    });
  });
  return html;
}

function buildDateNavs(filtered){
  const counts={};
  filtered.forEach(r=>{counts[r.Date]=(counts[r.Date]||0)+1;});
  const allDates=[...new Set(DATA.map(r=>r.Date))].sort((a,b)=>parseDt(a)-parseDt(b));

  // Desktop sidebar
  const dsb=document.getElementById('desktop-date-nav');
  if(dsb){
    let h=`<div class="sb-all-row" onclick="setDate(null)"><span>All dates</span><span class="sb-cnt">${filtered.length}</span></div>`;
    allDates.forEach(d=>{
      const cnt=counts[d]||0;
      if(!cnt) return;
      h+=`<div class="sb-date${activeDate===d?' active':''}" onclick="setDate('${d}')"><span>${d.replace('-2026','')}</span><span class="sb-cnt">${cnt}</span></div>`;
    });
    dsb.innerHTML=h;
  }

  // Mobile chips
  const mob=document.getElementById('mob-date-nav');
  if(mob){
    let h=`<div class="date-chip${activeDate===null?' active':''}" onclick="setDate(null)">All <span class="date-cnt">${filtered.length}</span></div>`;
    allDates.forEach(d=>{
      const cnt=counts[d]||0;
      if(!cnt) return;
      h+=`<div class="date-chip${activeDate===d?' active':''}" onclick="setDate('${d}')">${d.replace('-2026','')} <span class="date-cnt">${cnt}</span></div>`;
    });
    mob.innerHTML=h;
  }
}

function render(){
  const filtered=getFiltered();
  buildDateNavs(filtered);
  const high=filtered.filter(r=>r.Relevance>85).length;
  document.getElementById('s-showing').textContent=filtered.length;
  document.getElementById('s-showing-sub').textContent=high+' high impact';
  document.getElementById('result-count').textContent=filtered.length+' events';
  const hasFilt=activeRegion!=='all'||activeDate||selC.value||selCat.value||document.getElementById('sel-impact').value||getSearch();
  document.getElementById('filter-dot').style.display=hasFilt?'block':'none';
  if(!filtered.length){document.getElementById('events-list').innerHTML='';document.getElementById('empty-state').style.display='block';return;}
  document.getElementById('empty-state').style.display='none';
  let html='';
  if(groupBy==='date') html=renderGroupDate(filtered);
  else if(groupBy==='cat') html=renderGroupCat(filtered);
  else html=renderGroupCountry(filtered);
  document.getElementById('events-list').innerHTML=html;
}

function setRegion(r,btn){
  activeRegion=r;activeDate=null;
  document.querySelectorAll('#region-pills .pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setDate(d){activeDate=d;render();}
function setGroup(g,btn){
  groupBy=g;
  document.querySelectorAll('.grp-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function clearAll(){
  activeRegion='all';activeDate=null;
  selC.value='';selCat.value='';document.getElementById('sel-impact').value='';
  const s1=document.getElementById('desktop-search');const s2=document.getElementById('mob-search');
  if(s1)s1.value='';if(s2)s2.value='';
  document.querySelectorAll('#region-pills .pill').forEach(b=>b.classList.remove('active'));
  document.querySelector('#region-pills .pill').classList.add('active');
  render();
}
function toggleSearch(){
  const bar=document.getElementById('mob-search-bar');
  bar.classList.toggle('open');
  if(bar.classList.contains('open')) document.getElementById('mob-search').focus();
}
function toggleFilterPanel(){}

// Init static summary
(function(){
  const high=DATA.filter(r=>r.Relevance>85).length;
  document.getElementById('s-total').textContent=DATA.length;
  document.getElementById('s-high').textContent=high;
  const dates=[...new Set(DATA.map(r=>r.Date))].sort((a,b)=>parseDt(a)-parseDt(b));
  if(dates.length){
    const f=dates[0].replace('-2026',''),l=dates[dates.length-1].replace('-2026','');
    document.getElementById('s-range').textContent=f+' – '+l;
    document.getElementById('s-days').textContent=dates.length+' days';
  }

})();

render();
</script>
